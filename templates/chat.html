<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col">
    <header class="bg-blue-600 text-white p-4 shadow-lg text-center font-bold text-xl">
        Real-Time Chat Room
    </header>

    <div id="chat-log" class="flex-1 overflow-y-auto p-4 space-y-4">
        <div class="bg-white p-3 rounded-lg shadow-sm max-w-xs">
            <p class="text-sm text-gray-500">System</p>
            <p>Welcome to the chat!</p>
        </div>
    </div>

    <div class="bg-white p-4 border-t border-gray-200 flex gap-2">
        <input id="chat-message-input" type="text" placeholder="Type a message..." 
               class="flex-1 border rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
        <button id="chat-message-submit" 
                class="bg-blue-600 text-white px-6 py-2 rounded-full hover:bg-blue-700 transition">
            Send
        </button>
    </div>

    <script>
        const chatLog = document.querySelector('#chat-log');
        const messageInput = document.querySelector('#chat-message-input');
        const submitButton = document.querySelector('#chat-message-submit');

        // Render ya Localhost ke hisaab se WebSocket URL set karna
        const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
        const chatSocket = new WebSocket(
            wsScheme + '://' + window.location.host + '/ws/chat/'
        );

        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            const messageElement = document.createElement('div');
            messageElement.className = "bg-blue-100 p-3 rounded-lg shadow-sm max-w-xs ml-auto";
            messageElement.innerHTML = `<p class="text-sm text-blue-600 font-bold">You</p><p>${data.message}</p>`;
            chatLog.appendChild(messageElement);
            chatLog.scrollTop = chatLog.scrollHeight;
        };

        submitButton.onclick = function(e) {
            const message = messageInput.value;
            chatSocket.send(JSON.stringify({ 'message': message }));
            messageInput.value = '';
        };
    </script>
</body>
</html>
